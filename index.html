<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
background:black;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:url("photo2.JPG") center/cover no-repeat;
z-index:-2;
}
.dark{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* MUSIC START */
#start{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
}
#start button{
padding:15px 30px;
border:none;
border-radius:20px;
background:pink;
font-size:18px;
cursor:pointer;
}

/* PAGES */
.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}
.active{display:flex;}

.card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:25px;
width:90%;
max-width:420px;
text-align:center;
backdrop-filter:blur(10px);
}

.btn{
padding:12px 20px;
background:#ffd6e5;
border:none;
border-radius:15px;
margin-top:10px;
cursor:pointer;
}

/* CODE */
.code input{
width:45px;
height:50px;
font-size:22px;
text-align:center;
margin:5px;
border-radius:10px;
border:none;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}
.gallery img{
width:100%;
border-radius:15px;
}

/* LETTER */
#letterBox{
display:none;
background:white;
color:black;
padding:20px;
border-radius:15px;
margin-top:10px;
}

/* CALL */
.call{
position:fixed;
inset:0;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}
.accept{
width:80px;
height:80px;
border-radius:50%;
background:green;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
animation:pulse 1s infinite;
cursor:pointer;
}
@keyframes pulse{50%{transform:scale(1.1);}}

/* PROPOSAL */
.proposal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
text-align:center;
font-size:22px;
padding:20px;
}

/* HEARTS */
.heart{
position:absolute;
animation:float 6s linear infinite;
}
@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- MUSIC START -->
<div id="start">
<h2>💖 Tap to Enter Love Story 💖</h2>
<button onclick="start()">Start</button>

<audio id="music" loop>
<source src="song.mp3" type="audio/mp3">
</audio>
</div>

<div class="bg"></div>
<div class="dark"></div>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<div class="card">
<h2>I Belong To You 🤍</h2>
<button class="btn" onclick="next(2)">Continue</button>
</div>
</div>

<!-- PAGE 2 CODE -->
<div class="page" id="p2">
<div class="card">
<h2>Enter Code 🔐</h2>
<div class="code">
<input maxlength="1"><input maxlength="1"><input maxlength="1">
<input maxlength="1"><input maxlength="1"><input maxlength="1">
</div>
<button class="btn" onclick="check()">Unlock</button>
<p id="msg"></p>
</div>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
<div class="card">
<h2>First Meet?</h2>
<button class="btn" onclick="ans(this,false)">April 3</button>
<button class="btn" onclick="ans(this,true)">July 23</button>
<button class="btn" onclick="ans(this,false)">May 1</button>
<button class="btn" onclick="next(4)">Next</button>
</div>
</div>

<!-- GALLERY -->
<div class="page" id="p4">
<div class="card">
<h2>Gallery 🤍</h2>

<div class="gallery">
<img src="1.jpg">
<img src="2.JPG">
<img src="3.JPG">
<img src="4.JPG">
<img src="5.JPG">
<img src="6.jpg">
<img src="7.PNG">
<img src="8.jpg">
<img src="9.JPG">
<img src="10.JPG">
</div>

<button class="btn" onclick="next(5)">Next</button>
</div>
</div>

<!-- LETTER -->
<div class="page" id="p5">
<div class="card">
<h2>Open Letter 💌</h2>
<button class="btn" onclick="openLetter()">Open</button>
<div id="letterBox"><p id="text"></p></div>
</div>
</div>

<!-- CALL -->
<div class="call" id="call">
<h2>📞 Incoming Call</h2>
<h3>w1fey.x✨🧸💌</h3>
<div class="accept" onclick="accept()">📞</div>
</div>

<!-- PROPOSAL -->
<div class="proposal" id="proposal">
<div id="step"></div>
</div>

<script>

let music=document.getElementById("music");

function start(){
document.getElementById("start").style.display="none";
music.play();
}

function next(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("p"+n).classList.add("active");
}

function check(){
let c="";
document.querySelectorAll(".code input").forEach(i=>c+=i.value);
if(c==="051823") next(3);
else document.getElementById("msg").innerText="Wrong 💔";
}

function ans(btn,c){
btn.style.background=c?"lightgreen":"red";
}

function openLetter(){
document.getElementById("letterBox").style.display="block";

let text="I love you endlessly 🤍";
let i=0;

function type(){
if(i<text.length){
document.getElementById("text").innerHTML+=text[i++];
setTimeout(type,40);
}else{
setTimeout(()=>{
document.getElementById("call").style.display="flex";
},1500);
}
}
type();
}

function accept(){
document.getElementById("call").style.display="none";
document.getElementById("proposal").style.display="flex";

let steps=[
"💬 reading your letter...",
"💍 ring box opens...",
"🧎‍♀️💍 She is proposing him 🥺",
"❤️ He said YES",
"💋💖",
"💬 will you marry me?",
"💗 YES"
];

let i=0;
function run(){
if(i<steps.length){
document.getElementById("step").innerHTML=steps[i++];
setTimeout(run,2000);
}else{
setTimeout(()=>{
window.location.href="https://wa.me/94771636959?text=I%20love%20you%20so%20much%20purusha%20🤍%20will%20you%20stay%20with%20me%20forever%3F%20💍";
},3000);
}
}
run();
}

</script>

</body>
</html>
